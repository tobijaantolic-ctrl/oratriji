services:
  - type: web
    name: oratriji
    runtime: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
