<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VSE NAJBOLJŠE ATI!</title>
  <style>
    :root {
      --gold: #ffd166;
      --pink: #ff5c8a;
      --cyan: #4ce0d2;
      --blue: #61a5ff;
      --ink: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #07090f;
      color: var(--ink);
    }

    .stage {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      isolation: isolate;
      padding: 28px;
      text-align: center;
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -4;
      background-image: url("assets/ati-birthday.jpg");
      background-size: cover;
      background-position: 55% center;
      transform: scale(1.12);
      animation: photoEntrance 2400ms cubic-bezier(.2,.85,.18,1) forwards, slowZoom 14s ease-in-out 2400ms infinite alternate;
      filter: saturate(1.15) contrast(1.04);
    }

    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -3;
      background:
        radial-gradient(circle at 50% 45%, rgba(255, 209, 102, 0.28), transparent 20rem),
        radial-gradient(circle at 22% 18%, rgba(255, 92, 138, 0.22), transparent 18rem),
        linear-gradient(90deg, rgba(6, 7, 12, 0.78), rgba(6, 7, 12, 0.36), rgba(6, 7, 12, 0.72)),
        linear-gradient(0deg, rgba(6, 7, 12, 0.88), rgba(6, 7, 12, 0.12) 52%, rgba(6, 7, 12, 0.72));
    }

    .light-sweep,
    .ring,
    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .light-sweep {
      z-index: -1;
      background: linear-gradient(105deg, transparent 0 42%, rgba(255,255,255,0.36) 48%, transparent 55% 100%);
      transform: translateX(-115%);
      animation: sweep 1700ms ease-out 450ms forwards;
      mix-blend-mode: screen;
    }

    .ring {
      z-index: -2;
      display: grid;
      place-items: center;
    }

    .ring::before,
    .ring::after {
      content: "";
      position: absolute;
      width: min(82vw, 760px);
      aspect-ratio: 1;
      border: 2px solid rgba(255, 255, 255, 0.28);
      border-radius: 50%;
      transform: scale(0.45);
      opacity: 0;
      animation: ringPulse 1700ms cubic-bezier(.16,1,.3,1) forwards;
    }

    .ring::after {
      width: min(96vw, 930px);
      border-color: rgba(255, 209, 102, 0.28);
      animation-delay: 260ms;
    }

    .stars {
      z-index: -1;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.9) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(255,209,102,0.9) 0 1.2px, transparent 1.8px),
        radial-gradient(circle, rgba(76,224,210,0.8) 0 1px, transparent 1.7px);
      background-size: 92px 92px, 137px 137px, 173px 173px;
      background-position: 0 0, 28px 44px, 70px 20px;
      opacity: 0;
      animation: starsIn 900ms ease-out 950ms forwards, starDrift 12s linear 1300ms infinite;
    }

    .text-wrap {
      width: min(1180px, 100%);
      transform-style: preserve-3d;
    }

    .subtitle {
      display: inline-block;
      margin-bottom: clamp(16px, 3vw, 28px);
      color: rgba(255, 255, 255, 0.96);
      font-size: clamp(1.1rem, 3vw, 2.35rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 10px 36px rgba(0, 0, 0, 0.52);
      opacity: 0;
      transform: translateY(28px) scale(0.86);
      animation: subtitlePop 900ms cubic-bezier(.18,1.35,.25,1) 350ms forwards;
    }

    h1 {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.13em;
      font-size: clamp(4rem, 13.2vw, 12rem);
      line-height: 0.86;
      font-weight: 1000;
      letter-spacing: 0;
      text-transform: uppercase;
      perspective: 900px;
      filter: drop-shadow(0 24px 42px rgba(0,0,0,0.52));
    }

    h1::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -0.18em;
      width: min(76vw, 720px);
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--pink), var(--cyan), transparent);
      transform: translateX(-50%) scaleX(0);
      transform-origin: center;
      animation: underlineBlast 850ms cubic-bezier(.18,1.2,.22,1) 1300ms forwards;
      box-shadow: 0 0 40px rgba(255, 209, 102, 0.72);
    }

    .word {
      display: inline-flex;
      white-space: nowrap;
    }

    .char {
      display: inline-block;
      color: transparent;
      background: linear-gradient(115deg, #fff 0%, #ffe29b 25%, #ff6f91 47%, #70f4e8 68%, #fff 100%);
      background-size: 260% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      opacity: 0;
      transform: translate3d(0, 1.2em, -180px) rotateX(72deg) scale(0.52);
      animation:
        letterLaunch 900ms cubic-bezier(.16,1.38,.28,1) forwards,
        textShine 1800ms linear 1200ms infinite;
      animation-delay: calc(560ms + var(--i) * 48ms), calc(1400ms + var(--i) * 12ms);
      text-shadow:
        0 0 20px rgba(255, 255, 255, 0.45),
        0 0 44px rgba(255, 209, 102, 0.26);
    }

    .confetti {
      position: fixed;
      left: 50%;
      top: 48%;
      z-index: 5;
      width: 10px;
      height: 18px;
      border-radius: 3px;
      background: var(--gold);
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%);
      animation: confetti 1450ms cubic-bezier(.13,.8,.24,1) forwards;
      animation-delay: var(--delay);
    }

    @keyframes photoEntrance {
      from {
        opacity: 0;
        transform: scale(1.24);
        filter: blur(10px) saturate(1.2) contrast(1.04);
      }
      to {
        opacity: 1;
        transform: scale(1.12);
        filter: blur(0) saturate(1.15) contrast(1.04);
      }
    }

    @keyframes slowZoom {
      from { transform: scale(1.12) translate3d(0, 0, 0); }
      to { transform: scale(1.18) translate3d(-1.4%, -0.8%, 0); }
    }

    @keyframes subtitlePop {
      0% {
        opacity: 0;
        transform: translateY(28px) scale(0.86);
      }
      68% {
        opacity: 1;
        transform: translateY(-6px) scale(1.04);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes letterLaunch {
      0% {
        opacity: 0;
        transform: translate3d(0, 1.2em, -180px) rotateX(72deg) scale(0.52);
        filter: blur(12px);
      }
      58% {
        opacity: 1;
        transform: translate3d(0, -0.14em, 34px) rotateX(-12deg) scale(1.13);
        filter: blur(0);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 0) rotateX(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes textShine {
      from { background-position: 100% 50%; }
      to { background-position: 0% 50%; }
    }

    @keyframes underlineBlast {
      0% {
        opacity: 0;
        transform: translateX(-50%) scaleX(0);
      }
      100% {
        opacity: 1;
        transform: translateX(-50%) scaleX(1);
      }
    }

    @keyframes sweep {
      to { transform: translateX(115%); }
    }

    @keyframes ringPulse {
      0% {
        opacity: 0;
        transform: scale(0.45);
      }
      45% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: scale(1.18);
      }
    }

    @keyframes starsIn {
      to { opacity: 0.72; }
    }

    @keyframes starDrift {
      to { background-position: 92px 92px, 165px 181px, 243px 193px; }
    }

    @keyframes confetti {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) rotate(0deg) scale(0.4);
      }
      12% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) rotate(var(--r)) scale(1);
      }
    }

    @media (max-width: 760px) {
      .stage {
        padding: 18px;
      }

      .stage::before {
        background-position: 56% center;
      }

      .subtitle {
        font-size: clamp(1rem, 5vw, 1.55rem);
      }

      h1 {
        font-size: clamp(3.7rem, 18vw, 6.6rem);
        gap: 0.11em;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="light-sweep" aria-hidden="true"></div>
    <div class="ring" aria-hidden="true"></div>
    <div class="stars" aria-hidden="true"></div>

    <div class="text-wrap" aria-label="Za najboljšega atija. VSE NAJBOLJŠE ATI!">
      <div class="subtitle">Za najboljšega atija</div>
      <h1 id="title" aria-hidden="true">VSE NAJBOLJŠE ATI!</h1>
    </div>
  </main>

  <script>
    const title = document.getElementById("title");
    const text = title.textContent.trim();
    let index = 0;

    title.innerHTML = text
      .split(" ")
      .map((word) => {
        const letters = Array.from(word)
          .map((letter) => `<span class="char" style="--i:${index++}">${letter}</span>`)
          .join("");
        return `<span class="word">${letters}</span>`;
      })
      .join("");

    const colors = ["#ffd166", "#ff5c8a", "#4ce0d2", "#61a5ff", "#ffffff"];

    function launchConfetti() {
      for (let i = 0; i < 90; i += 1) {
        const piece = document.createElement("span");
        const angle = Math.random() * Math.PI * 2;
        const distance = 120 + Math.random() * 430;
        piece.className = "confetti";
        piece.style.background = colors[i % colors.length];
        piece.style.setProperty("--x", `${Math.cos(angle) * distance}px`);
        piece.style.setProperty("--y", `${Math.sin(angle) * distance + 170}px`);
        piece.style.setProperty("--r", `${Math.random() * 720 - 360}deg`);
        piece.style.setProperty("--delay", `${520 + Math.random() * 780}ms`);
        document.body.appendChild(piece);
        window.setTimeout(() => piece.remove(), 2600);
      }
    }

    window.addEventListener("load", launchConfetti);
  </script>
</body>
</html>
